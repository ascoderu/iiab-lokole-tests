name: Test on PR Label

on:
  repository_dispatch:
    types:
      - test-integration-lokole
      - test-integration-iiab

jobs:
  # Job 0: Generate matrix from ubuntu-versions.yml
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate matrix from ubuntu-versions.yml
        id: set-matrix
        run: |
          # Check if include_upcoming is requested via client_payload
          INCLUDE_UPCOMING="${{ github.event.client_payload.include_upcoming || 'false' }}"

          if [ "$INCLUDE_UPCOMING" = "true" ]; then
            echo "Including upcoming versions (pre-release images)..."
            MATRIX=$(python3 .github/scripts/generate-matrix.py --include-upcoming)
          else
            echo "Using supported versions only..."
            MATRIX=$(python3 .github/scripts/generate-matrix.py)
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix: $MATRIX"

  # Job 1: Provision Azure VM runners (one per Ubuntu version)
  provision-runners:
    needs: generate-matrix
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.continue_on_error || false }}
    strategy:
      fail-fast: false
      max-parallel: 4 # Parallel provisioning (10 vCPU quota allows 5× Standard_B2s)
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Provision Azure VM Runner
        uses: ./.github/actions/provision-azure-runner
        with:
          azure-credentials: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }
          github-token: ${{ secrets.INTEGRATION_TEST_PAT }}
          ubuntu-version: ${{ matrix.ubuntu_version }}
          ubuntu-lts: ${{ matrix.ubuntu_lts }}
          image-offer: ${{ matrix.image_offer }}
          image-sku: ${{ matrix.image_sku }}
          pr-number: ${{ github.event.client_payload.pr_number }}
          use-regular-vm: 'true'

  # Job 2: Run tests on Azure VMs
  test-on-azure-runners:
    needs: [generate-matrix, provision-runners]
    runs-on:
      - self-hosted
      - azure
      - ubuntu-${{ matrix.ubuntu_version }}
    timeout-minutes: 90
    continue-on-error: ${{ matrix.continue_on_error || false }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Extract PR details
        id: pr_details
        run: |
          echo "pr_number=${{ github.event.client_payload.pr_number }}" >> $GITHUB_OUTPUT
          echo "pr_ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
          echo "pr_sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
          echo "pr_repo=${{ github.event.client_payload.repo }}" >> $GITHUB_OUTPUT
          echo "lokole_commit=${{ github.event.client_payload.lokole_commit }}" >> $GITHUB_OUTPUT
          echo "lokole_repo=${{ github.event.client_payload.lokole_repo }}" >> $GITHUB_OUTPUT

      - name: Make scripts executable
        run: |
          chmod +x scripts/scenarios/*.sh
          chmod +x scripts/azure/*.sh
          chmod +x scripts/verify/*.sh

      - name: Run direct IIAB installation
        id: test
        run: |
          # Run IIAB installation directly on Azure VM (no nested VMs)
          ARGS="--pr-repo \"${{ steps.pr_details.outputs.pr_repo }}\" \
            --pr-ref \"${{ steps.pr_details.outputs.pr_ref }}\" \
            --pr-sha \"${{ steps.pr_details.outputs.pr_sha }}\" \
            --pr-number \"${{ steps.pr_details.outputs.pr_number }}\""

          # Add Lokole commit if provided
          if [ -n "${{ steps.pr_details.outputs.lokole_commit }}" ]; then
            ARGS="$ARGS --lokole-commit \"${{ steps.pr_details.outputs.lokole_commit }}\""
          fi

          # Add Lokole repo if provided
          if [ -n "${{ steps.pr_details.outputs.lokole_repo }}" ]; then
            ARGS="$ARGS --lokole-repo \"${{ steps.pr_details.outputs.lokole_repo }}\""
          fi

          eval ./scripts/scenarios/direct-install.sh $ARGS

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ steps.pr_details.outputs.pr_number }}-ubuntu-${{ matrix.ubuntu_version }}-results
          path: |
            *.txt
            *.json
            *.md
            *.log

  # Job 3: Post success comment to upstream PR (only if all tests pass)
  post-success-comment:
    needs: [generate-matrix, test-on-azure-runners]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: pr-${{ github.event.client_payload.pr_number }}-ubuntu-*-results
          path: test-results

      - name: Generate consolidated success comment
        id: comment
        run: |
          PR_NUMBER="${{ github.event.client_payload.pr_number }}"
          PR_REPO="${{ github.event.client_payload.repo }}"
          PR_REF="${{ github.event.client_payload.ref }}"
          
          # Determine upstream repo (for IIAB PRs, always post to iiab/iiab)
          if [[ "$PR_REPO" == *"iiab"* ]]; then
            UPSTREAM_OWNER="iiab"
            UPSTREAM_REPO="iiab"
          else
            # For Lokole PRs, post to ascoderu/lokole
            UPSTREAM_OWNER="ascoderu"
            UPSTREAM_REPO="lokole"
          fi
          
          echo "upstream_owner=$UPSTREAM_OWNER" >> $GITHUB_OUTPUT
          echo "upstream_repo=$UPSTREAM_REPO" >> $GITHUB_OUTPUT
          
          # Build comment body
          cat > comment.md << 'EOF'
          ## ✅ Integration Tests Passed
          
          All IIAB integration tests completed successfully across multiple Ubuntu versions.
          
          **Tested Configuration:**
          - **PR:** #${{ github.event.client_payload.pr_number }}
          - **Branch:** `${{ github.event.client_payload.ref }}`
          - **Commit:** `${{ github.event.client_payload.sha }}`
          
          **Test Results:**
          EOF
          
          # Add results for each Ubuntu version
          for result_dir in test-results/pr-${PR_NUMBER}-ubuntu-*-results; do
            if [ -d "$result_dir" ]; then
              version=$(basename "$result_dir" | sed 's/pr-.*-ubuntu-\(.*\)-results/\1/')
              
              # Check if lokole services are verified
              if [ -f "$result_dir/comprehensive-check-results.json" ]; then
                echo "- ✅ Ubuntu $version" >> comment.md
              else
                echo "- ⚠️ Ubuntu $version (completed but verification incomplete)" >> comment.md
              fi
            fi
          done
          
          cat >> comment.md << 'EOF'
          
          **Test Workflow:** https://github.com/ascoderu/iiab-lokole-tests/actions/runs/${{ github.run_id }}
          
          ---
          *Automated integration tests powered by [iiab-lokole-tests](https://github.com/ascoderu/iiab-lokole-tests)*
          EOF

      - name: Post comment to upstream PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INTEGRATION_TEST_PAT }}
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('comment.md', 'utf8');
            
            await github.rest.issues.createComment({
              owner: '${{ steps.comment.outputs.upstream_owner }}',
              repo: '${{ steps.comment.outputs.upstream_repo }}',
              issue_number: ${{ github.event.client_payload.pr_number }},
              body: commentBody
            });

  # Job 4: Cleanup Azure VMs (always runs, finds VMs by tags)
  cleanup-runners:
    needs: [provision-runners, test-on-azure-runners]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Cleanup Azure resources
        uses: ./.github/actions/cleanup-azure-runner
        with:
          azure-credentials: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }
          github-token: ${{ secrets.INTEGRATION_TEST_PAT }}
          run-id: ${{ github.run_id }}
          max-age-hours: '1'
